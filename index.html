<!doctype html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>وَصلة — منصة بطاقات NFC</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
  html { scroll-behavior: smooth; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; margin:0; }
  .ripple { position:absolute; border:1.5px solid #3FA796; border-radius:9999px; width:70px; height:70px; animation: ripple 2.2s ease-out infinite; }
  @keyframes ripple { 0% { transform: scale(0.6); opacity: .55; } 100% { transform: scale(2.6); opacity: 0; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const API_BASE = "https://nfc-api-afc0.onrender.com/api";

const CATEGORIES = {
  1: { label: "Restaurant", itemLabel: "Articles du menu" },
  2: { label: "Médecin / Cabinet", itemLabel: "Services" },
  3: { label: "Boutique", itemLabel: "Produits" },
  4: { label: "Entreprise", itemLabel: "Services" },
};

async function api(path, { method = "GET", token, body } = {}) {
  const res = await fetch(`${API_BASE}${path}`, {
    method,
    headers: { "Content-Type": "application/json", ...(token ? { Authorization: `Bearer ${token}` } : {}) },
    body: body ? JSON.stringify(body) : undefined,
  });
  let data = null;
  try { data = await res.json(); } catch {}
  if (!res.ok) throw new Error(data?.error || `خطأ (${res.status})`);
  return data;
}

function nav(hash) { window.location.hash = hash; }

function App() {
  const [route, setRoute] = React.useState(window.location.hash || "#home");
  React.useEffect(() => {
    const onHash = () => setRoute(window.location.hash || "#home");
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  if (route.startsWith("#card/")) return <PublicCard shortCode={route.replace("#card/", "")} />;
  if (route.startsWith("#setup/")) return <SetupPassword token={route.replace("#setup/", "")} />;
  if (route.startsWith("#dashboard")) return <Dashboard />;
  if (route.startsWith("#admin")) return <AdminPanel />;
  if (route.startsWith("#order")) return <OrderForm />;
  return <Home />;
}

function Home() {
  const [serverUp, setServerUp] = React.useState(null);
  React.useEffect(() => {
    fetch(`${API_BASE.replace("/api", "")}/health`).then(r => r.json()).then(() => setServerUp(true)).catch(() => setServerUp(false));
  }, []);

  const BLUE = "#2554F0";
  const INK = "#0F172A";
  const SLATE = "#64748B";

  const [menuOpen, setMenuOpen] = React.useState(false);
  function scrollTo(id) {
    setMenuOpen(false);
    document.getElementById(id)?.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  return (
    <div dir="ltr" style={{ background: "#FFFFFF", minHeight: "100vh", color: INK, textAlign: "left" }}>

      {/* Navbar */}
      <div className="sticky top-0 z-20 border-b backdrop-blur" style={{ borderColor: "#EEF1F6", background: "rgba(255,255,255,0.85)" }}>
        <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-1.5 font-extrabold text-lg shrink-0">
            <span style={{ color: BLUE }}>BC</span><span>Solutions</span>
          </div>
          <div className="hidden md:flex items-center gap-8 text-sm font-medium" style={{ color: "#334155" }}>
            <button onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })} className="hover:opacity-70">Accueil</button>
            <button onClick={() => scrollTo("features")} className="hover:opacity-70">Fonctionnalités</button>
            <button onClick={() => scrollTo("pricing")} className="hover:opacity-70">Tarifs</button>
            <button onClick={() => scrollTo("contact")} className="hover:opacity-70">Contact</button>
            <button onClick={() => nav("#dashboard")} className="hover:opacity-70">Espace client</button>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => nav("#admin")} style={{ background: BLUE }} className="text-white text-sm font-semibold px-4 py-2 rounded-lg shrink-0">
              Connexion
            </button>
            <button onClick={() => setMenuOpen(!menuOpen)} className="md:hidden w-9 h-9 flex items-center justify-center rounded-lg border" style={{ borderColor: "#E2E8F0" }} aria-label="Menu">
              <span style={{ color: INK }}>{menuOpen ? "✕" : "☰"}</span>
            </button>
          </div>
        </div>
        {menuOpen && (
          <div className="md:hidden flex flex-col border-t" style={{ borderColor: "#EEF1F6" }}>
            <button onClick={() => { setMenuOpen(false); window.scrollTo({ top: 0, behavior: "smooth" }); }} className="text-right px-6 py-3 text-sm font-medium border-b" style={{ borderColor: "#F1F5F9", color: "#334155" }}>Accueil</button>
            <button onClick={() => scrollTo("features")} className="text-right px-6 py-3 text-sm font-medium border-b" style={{ borderColor: "#F1F5F9", color: "#334155" }}>Fonctionnalités</button>
            <button onClick={() => scrollTo("pricing")} className="text-right px-6 py-3 text-sm font-medium border-b" style={{ borderColor: "#F1F5F9", color: "#334155" }}>Tarifs</button>
            <button onClick={() => scrollTo("contact")} className="text-right px-6 py-3 text-sm font-medium border-b" style={{ borderColor: "#F1F5F9", color: "#334155" }}>Contact</button>
            <button onClick={() => nav("#dashboard")} className="text-right px-6 py-3 text-sm font-medium" style={{ color: "#334155" }}>Espace client</button>
          </div>
        )}

      </div>

      {/* Hero */}
      <div className="max-w-6xl mx-auto px-6 pt-12 pb-10">
        <div className="grid md:grid-cols-2 gap-10 md:gap-16 items-center">
          {/* Text column */}
          <div>
            <span style={{ background: BLUE }} className="inline-block text-white text-xs font-semibold px-3 py-1.5 rounded-full mb-5">
              Carte NFC • Digital Business Card
            </span>

            <h1 className="text-[34px] md:text-[48px] leading-[1.15] font-extrabold mb-4" style={{ color: INK }}>
              Votre identité professionnelle,<br />
              <span style={{ color: BLUE }}>toujours à jour.</span>
            </h1>

            <p style={{ color: SLATE }} className="text-[15px] md:text-lg leading-7 md:leading-8 mb-6 md:max-w-md">
              Partagez instantanément vos coordonnées professionnelles grâce à
              une simple carte NFC. Rapide, moderne, écologique et toujours à jour.
            </p>

            <div className="flex gap-3 md:max-w-md">
              <button onClick={() => nav("#order")} style={{ background: BLUE }} className="flex-1 text-white font-semibold py-3.5 rounded-xl">
                Commander votre carte
              </button>
              <button onClick={() => nav("#dashboard")} style={{ borderColor: "#E2E8F0", color: INK }} className="flex-1 font-semibold py-3.5 rounded-xl border">
                Espace client
              </button>
            </div>
          </div>

function Step({ n, title, text, color, ink }) {
  return (
    <div className="flex items-start gap-4">

      <div>
        <p className="font-bold text-sm md:text-base" style={{ color: ink }}>{title}</p>
        <p style={{ color: "#64748B" }} className="text-xs md:text-sm mt-1 leading-5 md:leading-6">{text}</p>
      </div>
    </div>
  );
}

function FeatureCard({ icon, title, text, color }) {
  return (
    <div className="p-4 rounded-xl border" style={{ borderColor: "#EEF1F6" }}>
      <div style={{ background: color }} className="w-9 h-9 rounded-lg flex items-center justify-center text-base mb-3">{icon}</div>
      <p className="font-bold text-sm" style={{ color: "#0F172A" }}>{title}</p>
      <p style={{ color: "#64748B" }} className="text-xs mt-1 leading-5">{text}</p>
    </div>
  );
}

function PricingCard({ name, price, text, color, ink, highlight }) {
  return (
    <div className="p-5 rounded-xl border flex items-center justify-between" style={{ borderColor: highlight ? color : "#EEF1F6", background: highlight ? "#F5F8FF" : "white" }}>
      <div>
        <p className="font-bold text-sm" style={{ color: ink }}>{name}</p>
        <p style={{ color: "#64748B" }} className="text-xs mt-1">{text}</p>
      </div>
      <p className="font-extrabold text-sm whitespace-nowrap" style={{ color }}>{price}</p>
    </div>
  );
}

function Stat3({ value, label, color }) {
  return (
    <div className="text-center">
      <p className="text-xl font-extrabold" style={{ color }}>{value}</p>
      <p style={{ color: "#64748B" }} className="text-xs mt-0.5">{label}</p>
    </div>
  );
}

function FeatureRow({ icon, title, text, color }) {

    <div className="flex items-start gap-3 p-4 rounded-xl" style={{ background: "#F8FAFC" }}>
      <div style={{ background: color }} className="w-9 h-9 rounded-lg flex items-center justify-center text-base shrink-0">{icon}</div>

        <p style={{ color: "#64748B" }} className="text-xs mt-0.5 leading-5">{text}</p>

    </div>
  );
}

function PublicCard({ shortCode }) {
  const [state, setState] = React.useState({ loading: true, error: null, data: null });
  React.useEffect(() => {
    api(`/public/card/${shortCode}`).then(data => setState({ loading: false, error: null, data })).catch(err => setState({ loading: false, error: err.message, data: null }));
  }, [shortCode]);

  const BLUE = "#2554F0";
  const INK = "#0F172A";
  const SLATE = "#64748B";

  // أيقونات حقيقية للعلامات التجارية (Font Awesome) بألوانها الرسمية
  const SOCIAL_META = {
    facebook: { fa: "fa-brands fa-facebook-f", color: "#1877F2" },
    instagram: { fa: "fa-brands fa-instagram", color: "#E1306C" },
    linkedin: { fa: "fa-brands fa-linkedin-in", color: "#0A66C2" },
    tiktok: { fa: "fa-brands fa-tiktok", color: "#000000" },
    youtube: { fa: "fa-brands fa-youtube", color: "#FF0000" },
    twitter: { fa: "fa-brands fa-x-twitter", color: "#000000" },
    snapchat: { fa: "fa-brands fa-snapchat", color: "#FFC800" },
  };

  // --- حالة السلة ---
  const [qty, setQty] = React.useState({}); // { itemId: quantity }
  const [showOrderForm, setShowOrderForm] = React.useState(false);
  const [orderInfo, setOrderInfo] = React.useState({ customer_name: "", customer_phone: "", notes: "" });
  const [orderStatus, setOrderStatus] = React.useState("idle"); // idle | sending | done | error
  const [orderErr, setOrderErr] = React.useState("");

  function changeQty(item, delta) {
    setQty(q => {
      const next = Math.max(0, (q[item.id] || 0) + delta);
      return { ...q, [item.id]: next };
    });
  }

  if (state.loading) return <ScreenMsg text="Chargement..." />;
  if (state.error) return <ScreenMsg text="Cette carte est introuvable ou temporairement indisponible." isError />;
  const c = state.data;
  const accent = c.accentColor || BLUE;
  const isOrderable = c.categoryId === 1; // الطلب التفاعلي للمطاعم فقط

  const cartItems = (c.items || []).filter(it => qty[it.id] > 0).map(it => ({ ...it, quantity: qty[it.id] }));
  const cartCount = cartItems.reduce((s, it) => s + it.quantity, 0);

  async function submitOrder() {
    setOrderErr("");
    if (!orderInfo.customer_name || !orderInfo.customer_phone) {
      setOrderErr("Le nom et le téléphone sont obligatoires.");
      return;
    }
    setOrderStatus("sending");
    try {
      await api(`/public/card/${shortCode}/orders`, {
        method: "POST",
        body: {
          customer_name: orderInfo.customer_name,
          customer_phone: orderInfo.customer_phone,
          notes: orderInfo.notes,
          items: cartItems.map(it => ({ name: it.name, subtitle: it.subtitle, quantity: it.quantity })),
        },
      });
      setOrderStatus("done");
    } catch (e) {
      setOrderErr(e.message);
      setOrderStatus("idle");
    }
  }

  const socialLinks = (c.links || []).filter(l => l.url);

  const actions = [
    c.phone && { href: `tel:${c.phone}`, fa: "fa-solid fa-phone", color: "#16A34A", label: "Appeler" },
    c.whatsapp && { href: `https://wa.me/${c.whatsapp.replace(/^0/, "213")}`, fa: "fa-brands fa-whatsapp", color: "#25D366", label: "WhatsApp", blank: true },
    c.mapsLink && { href: c.mapsLink, fa: "fa-solid fa-location-dot", color: "#EF4444", label: "Itinéraire", blank: true },
    c.website && { href: c.website, fa: "fa-solid fa-globe", color: BLUE, label: "Site web", blank: true },
    c.email && { href: `mailto:${c.email}`, fa: "fa-solid fa-envelope", color: "#7C3AED", label: "E-mail" },
    ...socialLinks.map(l => ({ href: l.url, fa: SOCIAL_META[l.icon]?.fa || "fa-solid fa-link", color: SOCIAL_META[l.icon]?.color || BLUE, label: l.label, blank: true })),
  ].filter(Boolean);

  return (
    <div dir="ltr" style={{ background: "linear-gradient(180deg, #EEF3FF 0%, #F8FAFC 320px)", minHeight: "100vh", textAlign: "left" }}>
      <div className="relative h-40 md:h-48 overflow-hidden" style={{ background: `linear-gradient(135deg, ${accent}, ${accent}CC)` }}>
        <div className="absolute inset-0" style={{ background: "radial-gradient(circle at 20% 20%, rgba(255,255,255,0.18), transparent 55%)" }} />
        <div className="absolute -bottom-12 left-1/2 -translate-x-1/2 md:left-10 md:translate-x-0 w-24 h-24 rounded-2xl bg-white shadow-xl flex items-center justify-center text-3xl font-extrabold overflow-hidden ring-4 ring-white" style={{ color: accent }}>

          <a href={c.mapsLink || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.address)}`} target="_blank" rel="noreferrer"

            <i className="fa-solid fa-location-dot" style={{ color: accent }}></i> {c.address}

          <div className="mt-8 text-left">
            <h2 className="text-sm font-bold mb-3 text-center md:text-left" style={{ color: INK }}>{isOrderable ? "Commander" : "Détails"}</h2>

              {c.items.map(it => (
                <div key={it.id} className="flex justify-between items-center px-4 py-3 rounded-lg bg-white border" style={{ borderColor: "#EEF1F6" }}>
                  <div>
                    <span className="text-sm block" style={{ color: INK }}>{it.name}</span>
                    <span className="text-xs font-semibold" style={{ color: accent }}>{it.subtitle}</span>
                  </div>
                  {isOrderable && (
                    <div className="flex items-center gap-3">
                      <button onClick={() => changeQty(it, -1)} disabled={!qty[it.id]} style={{ borderColor: "#E2E8F0", color: qty[it.id] ? INK : "#CBD5E1" }} className="w-7 h-7 rounded-full border flex items-center justify-center text-sm">−</button>
                      <span className="text-sm font-semibold w-4 text-center" style={{ color: INK }}>{qty[it.id] || 0}</span>
                      <button onClick={() => changeQty(it, 1)} style={{ background: accent }} className="w-7 h-7 rounded-full text-white flex items-center justify-center text-sm">+</button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        <div className="mt-12 text-center text-xs" style={{ color: "#94A3B8" }}>
          Propulsé par <button onClick={() => nav("#home")} style={{ color: BLUE }} className="font-semibold underline-offset-2 hover:underline">BCSolutions</button> NFC
        </div>
      </div>

      {/* Barre de commande flottante */}
      {cartCount > 0 && !showOrderForm && (
        <div className="fixed bottom-0 left-0 right-0 p-4" style={{ background: "white", borderTop: "1px solid #EEF1F6" }}>
          <div className="max-w-md md:max-w-2xl mx-auto">
            <button onClick={() => setShowOrderForm(true)} style={{ background: accent }} className="w-full py-3.5 rounded-xl text-white font-semibold flex items-center justify-center gap-2">
              Commander ({cartCount}) <i className="fa-solid fa-arrow-right"></i>
            </button>
          </div>
        </div>
      )}

      {/* Formulaire de commande (overlay) */}
      {showOrderForm && (
        <div className="fixed inset-0 z-30 flex items-end md:items-center justify-center" style={{ background: "rgba(15,23,42,0.5)" }}>
          <div className="bg-white rounded-t-2xl md:rounded-2xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto">
            {orderStatus === "done" ? (
              <div className="text-center py-6">
                <div style={{ background: "#22C55E" }} className="w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl mb-4 mx-auto">✓</div>
                <h3 className="text-lg font-extrabold mb-2" style={{ color: INK }}>Commande envoyée !</h3>
                <p style={{ color: SLATE }} className="text-sm mb-6">{c.businessName} a bien reçu votre commande et vous contactera bientôt.</p>
                <button onClick={() => { setShowOrderForm(false); setOrderStatus("idle"); setQty({}); setOrderInfo({ customer_name: "", customer_phone: "", notes: "" }); }} style={{ background: accent }} className="text-white font-semibold px-6 py-3 rounded-xl">Fermer</button>
              </div>
            ) : (<>
              <div className="flex items-center justify-between mb-4">
                <h3 className="text-lg font-extrabold" style={{ color: INK }}>Votre commande</h3>
                <button onClick={() => setShowOrderForm(false)} style={{ color: SLATE }}>✕</button>
              </div>

              <div className="flex flex-col gap-2 mb-4">
                {cartItems.map(it => (
                  <div key={it.id} className="flex justify-between text-sm">
                    <span style={{ color: INK }}>{it.quantity} × {it.name}</span>
                    <span style={{ color: SLATE }}>{it.subtitle}</span>
                  </div>
                ))}
              </div>

              <Field label="Votre nom *" value={orderInfo.customer_name} onChange={v => setOrderInfo({ ...orderInfo, customer_name: v })} />
              <Field label="Téléphone *" value={orderInfo.customer_phone} onChange={v => setOrderInfo({ ...orderInfo, customer_phone: v })} />
              <div className="mt-3">
                <label className="text-xs block mb-1 font-medium" style={{ color: SLATE }}>Note (optionnel)</label>
                <textarea value={orderInfo.notes} onChange={e => setOrderInfo({ ...orderInfo, notes: e.target.value })} rows={2} style={{ background: "#F8FAFC", borderColor: "#E2E8F0", color: INK }} className="w-full border rounded-lg px-3 py-2.5 text-sm outline-none resize-none" />
              </div>

              {orderErr && <p style={{ color: "#DC2626" }} className="text-xs mt-3">{orderErr}</p>}
              <button onClick={submitOrder} disabled={orderStatus === "sending"} style={{ background: accent, opacity: orderStatus === "sending" ? 0.7 : 1 }} className="w-full py-3.5 rounded-xl text-white font-semibold mt-5">
                {orderStatus === "sending" ? "Envoi..." : "Confirmer la commande"}
              </button>
            </>)}
          </div>
        </div>
      )}
    </div>
  );
}

function ScreenMsg({ text, isError }) {
  return (
    <div dir="ltr" style={{ background: "#F8FAFC", minHeight: "100vh" }} className="flex flex-col items-center justify-center px-6 text-center gap-2">
      {isError && <span className="text-2xl">⚠️</span>}
      <p style={{ color: isError ? "#0F172A" : "#64748B" }} className="text-sm">{text}</p>
    </div>
  );
}

function Field({ label, value, onChange }) {
  return (
    <div className="mt-3">
      <label className="text-xs block mb-1 font-medium" style={{ color: "#64748B" }}>{label}</label>
      <input value={value || ""} onChange={e => onChange(e.target.value)} style={{ background: "#F8FAFC", borderColor: "#E2E8F0", color: "#0F172A" }} className="w-full border rounded-lg px-3 py-2.5 text-sm outline-none" />
    </div>
  );
}

function SetupPassword({ token }) {
  const BLUE = "#2554F0"; const INK = "#0F172A"; const SLATE = "#64748B";
  const [check, setCheck] = React.useState({ loading: true, error: null, businessName: null });
  const [pw, setPw] = React.useState("");
  const [pw2, setPw2] = React.useState("");
  const [err, setErr] = React.useState("");
  const [status, setStatus] = React.useState("idle"); // idle | sending | done

  React.useEffect(() => {
    api(`/public/setup/${token}`).then(d => setCheck({ loading: false, error: null, businessName: d.businessName }))
      .catch(e => setCheck({ loading: false, error: e.message, businessName: null }));
  }, [token]);

  async function submit() {
    setErr("");
    if (pw.length < 4) return setErr("كلمة السر يجب أن تكون 4 أحرف على الأقل");
    if (pw !== pw2) return setErr("كلمتا السر غير متطابقتين");
    setStatus("sending");
    try {
      await api(`/public/setup/${token}`, { method: "POST", body: { password: pw } });
      setStatus("done");
    } catch (e) {
      setErr(e.message);
      setStatus("idle");
    }
  }

  if (check.loading) return <ScreenMsg text="Chargement..." />;
  if (check.error) return <ScreenMsg text={check.error} isError />;

  return (
    <div dir="ltr" style={{ background: "#F8FAFC", minHeight: "100vh", textAlign: "left" }} className="flex flex-col justify-center px-6">
      <div className="max-w-sm mx-auto w-full bg-white rounded-2xl p-7 border shadow-sm" style={{ borderColor: "#EEF1F6" }}>
        {status === "done" ? (
          <div className="text-center">
            <div style={{ background: "#22C55E" }} className="w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl mb-4 mx-auto">✓</div>
            <h1 className="text-xl font-bold mb-2" style={{ color: INK }}>Mot de passe créé !</h1>
            <p style={{ color: SLATE }} className="text-sm mb-6">Vous pouvez maintenant vous connecter à votre espace client.</p>
            <button onClick={() => nav("#dashboard")} style={{ background: BLUE }} className="text-white font-semibold px-6 py-3 rounded-xl">Se connecter</button>
          </div>
        ) : (<>
          <div style={{ background: BLUE }} className="w-11 h-11 rounded-xl flex items-center justify-center text-white text-lg mb-4">🔐</div>
          <h1 className="text-xl font-bold mb-1" style={{ color: INK }}>Bienvenue{check.businessName ? `, ${check.businessName}` : ""}</h1>
          <p style={{ color: SLATE }} className="text-sm mb-6">Créez votre mot de passe pour accéder à votre espace client.</p>
          <input placeholder="Nouveau mot de passe" type="password" value={pw} onChange={e => setPw(e.target.value)} style={{ background: "#F8FAFC", borderColor: "#E2E8F0", color: INK }} className="w-full border rounded-lg px-4 py-3 mb-3 text-sm outline-none" />
          <input placeholder="Confirmer le mot de passe" type="password" value={pw2} onChange={e => setPw2(e.target.value)} onKeyDown={e => e.key === "Enter" && submit()} style={{ background: "#F8FAFC", borderColor: "#E2E8F0", color: INK }} className="w-full border rounded-lg px-4 py-3 mb-4 text-sm outline-none" />
          {err && <p style={{ color: "#DC2626" }} className="text-xs mb-3">{err}</p>}
          <button onClick={submit} disabled={status === "sending"} style={{ background: BLUE, opacity: status === "sending" ? 0.7 : 1 }} className="w-full py-3 rounded-lg font-semibold text-white">{status === "sending" ? "..." : "Créer mon mot de passe"}</button>
        </>)}
      </div>
    </div>
  );
}

function OrderForm() {
  const BLUE = "#2554F0"; const INK = "#0F172A"; const SLATE = "#64748B";
  const [form, setForm] = React.useState({ business_name: "", category_id: 1, contact_name: "", phone: "", email: "", password: "" });
  const [status, setStatus] = React.useState("idle"); // idle | sending | done | error
  const [err, setErr] = React.useState("");

  function update(field, value) { setForm({ ...form, [field]: value }); }

  async function submit() {
    setErr("");
    if (!form.business_name || !form.phone || !form.password) {
      setErr("Le nom, le téléphone et le mot de passe sont obligatoires.");
      return;
    }
    if (form.password.length < 4) {
      setErr("Le mot de passe doit contenir au moins 4 caractères.");
      return;
    }
    setStatus("sending");
    try {
      await api("/public/signup", { method: "POST", body: form });
      setStatus("done");
    } catch (e) {
      setErr(e.message);
      setStatus("idle");
    }
  }

  if (status === "done") {
    return (
      <div dir="ltr" style={{ background: "#F8FAFC", minHeight: "100vh", textAlign: "left" }} className="flex flex-col items-center justify-center px-6 text-center">
        <div style={{ background: "#22C55E" }} className="w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl mb-5">✓</div>
        <h1 className="text-xl font-extrabold mb-2" style={{ color: INK }}>Compte créé !</h1>
        <p style={{ color: SLATE }} className="text-sm max-w-xs mb-8">
          Votre compte est en attente de validation par notre équipe. Vous pourrez vous connecter dès son activation.
        </p>
        <button onClick={() => nav("#home")} style={{ background: BLUE }} className="text-white font-semibold px-6 py-3 rounded-xl">Retour à l'accueil</button>
      </div>
    );
  }

  return (
    <div dir="ltr" style={{ background: "#F8FAFC", minHeight: "100vh", textAlign: "left" }}>
      <div className="max-w-md mx-auto px-6 py-8">
        <button onClick={() => nav("#home")} className="text-sm mb-6" style={{ color: SLATE }}>‹ Accueil</button>

        <span style={{ background: BLUE }} className="inline-block text-white text-xs font-semibold px-3 py-1.5 rounded-full mb-4">
          Créer mon compte
        </span>
        <h1 className="text-2xl font-extrabold mb-1" style={{ color: INK }}>Commandez votre carte NFC</h1>
        <p style={{ color: SLATE }} className="text-sm mb-6">
          Créez votre compte dès maintenant. Notre équipe l'active sous peu, et vous recevrez votre carte physique.
        </p>

        <div className="bg-white rounded-2xl p-5 border shadow-sm" style={{ borderColor: "#EEF1F6" }}>
          <Field label="Nom de l'établissement *" value={form.business_name} onChange={v => update("business_name", v)} />
          <div className="mt-3">
            <label className="text-xs block mb-1 font-medium" style={{ color: SLATE }}>Catégorie</label>
            <select value={form.category_id} onChange={e => update("category_id", Number(e.target.value))} style={{ background: "#F8FAFC", borderColor: "#E2E8F0", color: INK }} className="w-full border rounded-lg px-3 py-2.5 text-sm outline-none">
              {Object.entries(CATEGORIES).map(([id, v]) => <option key={id} value={id}>{v.label}</option>)}
            </select>
          </div>
          <Field label="Votre nom" value={form.contact_name} onChange={v => update("contact_name", v)} />
          <Field label="Téléphone (identifiant de connexion) *" value={form.phone} onChange={v => update("phone", v)} />
          <Field label="E-mail" value={form.email} onChange={v => update("email", v)} />
          <div className="mt-3">
            <label className="text-xs block mb-1 font-medium" style={{ color: SLATE }}>Créez votre mot de passe *</label>
            <input type="password" value={form.password} onChange={e => update("password", e.target.value)} onKeyDown={e => e.key === "Enter" && submit()} style={{ background: "#F8FAFC", borderColor: "#E2E8F0", color: INK }} className="w-full border rounded-lg px-3 py-2.5 text-sm outline-none" />
          </div>

          {err && <p style={{ color: "#DC2626" }} className="text-xs mt-3">{err}</p>}
          <button onClick={submit} disabled={status === "sending"} style={{ background: BLUE, opacity: status === "sending" ? 0.7 : 1 }} className="w-full py-3 rounded-lg font-semibold text-white mt-5">
            {status === "sending" ? "Envoi..." : "Créer mon compte"}
          </button>
        </div>
      </div>
    </div>
  );
}

function Dashboard() {
  const [token, setToken] = React.useState(null);
  const [phone, setPhone] = React.useState("");
  const [pw, setPw] = React.useState("");
  const [err, setErr] = React.useState("");
  const [profile, setProfile] = React.useState(null);
  const [items, setItems] = React.useState([]);
  const [links, setLinks] = React.useState([]);
  const [orders, setOrders] = React.useState([]);
  const [tab, setTab] = React.useState("profile"); // profile | orders
  const [stats, setStats] = React.useState(null);
  const [saved, setSaved] = React.useState(false);

  async function login() {
    setErr("");
    try {
      const { token: t } = await api("/auth/business/login", { method: "POST", body: { phone, password: pw } });
      const [me, myItems, myLinks, myStats, myOrders] = await Promise.all([
        api("/business/me", { token: t }), api("/business/items", { token: t }), api("/business/links", { token: t }), api("/business/stats", { token: t }), api("/business/orders", { token: t }),
      ]);
      setProfile(me); setItems(myItems); setLinks(myLinks); setStats(myStats); setOrders(myOrders);
      setToken(t); // نفعّل التوكن فقط بعد ما نتأكد كل البيانات وصلت بنجاح
    } catch (e) { setErr(e.message); }
  }

  async function setOrderStatus(o, status) {
    await api(`/business/orders/${o.id}/status`, { method: "PUT", token, body: { status } });
    setOrders(orders.map(x => x.id === o.id ? { ...x, status } : x));
  }

  const newOrdersCount = orders.filter(o => o.status === "new").length;

  async function saveProfile() {
    try {
      const updated = await api("/business/me", { method: "PUT", token, body: profile });
      setProfile(updated); setSaved(true); setTimeout(() => setSaved(false), 1800);
    } catch (e) { setErr(e.message); }
  }

  async function addItem() {
    const created = await api("/business/items", { method: "POST", token, body: { name: "Nouvel article", subtitle: "" } });
    setItems([...items, created]);
  }
  function updateItem(id, field, value) { setItems(items.map(it => it.id === id ? { ...it, [field]: value } : it)); }
  async function persistItem(id) {
    const it = items.find(i => i.id === id);
    await api(`/business/items/${id}`, { method: "PUT", token, body: { name: it.name, subtitle: it.subtitle } });
  }
  async function removeItem(id) {
    await api(`/business/items/${id}`, { method: "DELETE", token });
    setItems(items.filter(i => i.id !== id));
  }

  const SOCIAL_PLATFORMS = [
    { icon: "facebook", label: "Facebook" },
    { icon: "instagram", label: "Instagram" },
    { icon: "linkedin", label: "LinkedIn" },
    { icon: "tiktok", label: "TikTok" },
    { icon: "youtube", label: "YouTube" },
    { icon: "twitter", label: "X / Twitter" },
    { icon: "snapchat", label: "Snapchat" },
  ];
  async function addLink(platform) {
    const created = await api("/business/links", { method: "POST", token, body: { label: platform.label, url: "", icon: platform.icon, sort_order: links.length } });
    setLinks([...links, created]);
  }
  function updateLink(id, url) { setLinks(links.map(l => l.id === id ? { ...l, url } : l)); }
  async function persistLink(id) {
    const l = links.find(x => x.id === id);
    await api(`/business/links/${id}`, { method: "PUT", token, body: { url: l.url } }).catch(() => {});
  }
  async function removeLink(id) {
    await api(`/business/links/${id}`, { method: "DELETE", token });
    setLinks(links.filter(l => l.id !== id));
  }

  const BLUE = "#2554F0"; const INK = "#0F172A"; const SLATE = "#64748B";

  const [forgot, setForgot] = React.useState(false);
  const [forgotPhone, setForgotPhone] = React.useState("");
  const [forgotStatus, setForgotStatus] = React.useState("idle"); // idle | sending | done

  async function submitForgot() {
    if (!forgotPhone) return;
    setForgotStatus("sending");
    try {
      await api("/public/password-reset-requests", { method: "POST", body: { phone: forgotPhone } });
      setForgotStatus("done");
    } catch { setForgotStatus("idle"); }
  }

  if (!token) {
    return (
      <div dir="ltr" style={{ background: "#F8FAFC", minHeight: "100vh", textAlign: "left" }} className="flex flex-col justify-center px-6">
        <button onClick={() => nav("#home")} className="text-sm mb-8" style={{ color: SLATE }}>‹ Accueil</button>
        <div className="max-w-sm mx-auto w-full bg-white rounded-2xl p-7 border shadow-sm" style={{ borderColor: "#EEF1F6" }}>
          {forgot ? (
            forgotStatus === "done" ? (
              <div className="text-center py-4">
                <div style={{ background: "#22C55E" }} className="w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl mb-4 mx-auto">✓</div>
                <h1 className="text-lg font-bold mb-2" style={{ color: INK }}>Demande envoyée</h1>
                <p style={{ color: SLATE }} className="text-sm mb-6">Notre équipe vous contactera pour réinitialiser votre accès.</p>
                <button onClick={() => { setForgot(false); setForgotStatus("idle"); }} style={{ color: BLUE }} className="text-sm font-semibold">‹ Retour à la connexion</button>
              </div>
            ) : (<>
              <div style={{ background: BLUE }} className="w-11 h-11 rounded-xl flex items-center justify-center text-white text-lg mb-4">🔑</div>
              <h1 className="text-xl font-bold mb-1" style={{ color: INK }}>Mot de passe oublié</h1>
              <p style={{ color: SLATE }} className="text-sm mb-6">Entrez votre numéro de téléphone, notre équipe vous recontacte pour réinitialiser votre accès.</p>
              <input placeholder="Numéro de téléphone" value={forgotPhone} onChange={e => setForgotPhone(e.target.value)} onKeyDown={e => e.key === "Enter" && submitForgot()} style={{ background: "#F8FAFC", borderColor: "#E2E8F0", color: INK }} className="w-full border rounded-lg px-4 py-3 mb-4 text-sm outline-none" />
              <button onClick={submitForgot} disabled={forgotStatus === "sending"} style={{ background: BLUE }} className="w-full py-3 rounded-lg font-semibold text-white mb-3">{forgotStatus === "sending" ? "..." : "Envoyer la demande"}</button>
              <button onClick={() => setForgot(false)} style={{ color: SLATE }} className="w-full text-sm">Retour à la connexion</button>
            </>)
          ) : (<>
            <div style={{ background: BLUE }} className="w-11 h-11 rounded-xl flex items-center justify-center text-white text-lg mb-4">📋</div>
            <h1 className="text-xl font-bold mb-1" style={{ color: INK }}>Espace client</h1>
            <p style={{ color: SLATE }} className="text-sm mb-6">Connectez-vous avec le numéro et le mot de passe que vous avez créé.</p>
            <input placeholder="Numéro de téléphone" value={phone} onChange={e => setPhone(e.target.value)} onKeyDown={e => e.key === "Enter" && login()} style={{ background: "#F8FAFC", borderColor: "#E2E8F0", color: INK }} className="w-full border rounded-lg px-4 py-3 mb-3 text-sm outline-none" />
            <input placeholder="Mot de passe" type="password" value={pw} onChange={e => setPw(e.target.value)} onKeyDown={e => e.key === "Enter" && login()} style={{ background: "#F8FAFC", borderColor: "#E2E8F0", color: INK }} className="w-full border rounded-lg px-4 py-3 mb-4 text-sm outline-none" />
            {err && <p style={{ color: "#DC2626" }} className="text-xs mb-3">{err}</p>}
            <button onClick={login} style={{ background: BLUE }} className="w-full py-3 rounded-lg font-semibold text-white mb-3">Se connecter</button>
            <button onClick={() => setForgot(true)} style={{ color: BLUE }} className="w-full text-sm font-medium">Mot de passe oublié ?</button>
          </>)}
        </div>
      </div>
    );
  }

  if (!profile) {
    return (
      <div dir="ltr" style={{ background: "#F8FAFC", minHeight: "100vh", color: SLATE }} className="flex items-center justify-center text-sm">

      </div>

  const cat = CATEGORIES[profile.category_id] || CATEGORIES[1];
  return (
    <div dir="ltr" style={{ background: "#F8FAFC", minHeight: "100vh", textAlign: "left" }}>
      <div className="max-w-md md:max-w-3xl mx-auto px-6 py-8">
        <div className="flex items-center justify-between mb-6">
          <button onClick={() => setToken(null)} className="text-sm" style={{ color: SLATE }}>‹ Déconnexion</button>
          <button onClick={() => nav("#home")} className="text-sm" style={{ color: SLATE }}>Accueil ›</button>
        </div>

        <div className="flex items-center gap-4 mb-8">
          <div style={{ background: BLUE }} className="w-14 h-14 rounded-2xl flex items-center justify-center text-white text-xl font-extrabold shrink-0">
            {profile.business_name?.trim()?.[0]?.toUpperCase() || "?"}
          </div>
          <div>
            <h1 className="text-xl font-extrabold" style={{ color: INK }}>{profile.business_name || "Votre carte"}</h1>
            <div className="flex items-center gap-2 mt-1">
              <span style={{ background: "#EFF6FF", color: BLUE }} className="text-xs font-semibold px-2.5 py-1 rounded-full">{cat.label}</span>
              {stats && <span style={{ color: SLATE }} className="text-xs">{stats.totalScans} scans au total</span>}
            </div>
          </div>
        </div>

        <div className="flex gap-2 mb-6 border-b" style={{ borderColor: "#EEF1F6" }}>
          <button onClick={() => setTab("profile")} className="px-1 pb-3 text-sm font-semibold" style={{ color: tab === "profile" ? BLUE : SLATE, borderBottom: tab === "profile" ? `2px solid ${BLUE}` : "2px solid transparent" }}>Profil</button>
          <button onClick={() => setTab("orders")} className="px-4 pb-3 text-sm font-semibold flex items-center gap-1.5" style={{ color: tab === "orders" ? BLUE : SLATE, borderBottom: tab === "orders" ? `2px solid ${BLUE}` : "2px solid transparent" }}>
            Commandes
            {newOrdersCount > 0 && <span style={{ background: "#DC2626" }} className="text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">{newOrdersCount}</span>}
          </button>
        </div>

        {tab === "profile" && (<>
        <div className="md:grid md:grid-cols-2 md:gap-6">
          <div className="bg-white rounded-2xl p-5 border shadow-sm" style={{ borderColor: "#EEF1F6" }}>
            <p className="text-xs font-bold uppercase tracking-wide mb-3" style={{ color: "#94A3B8" }}>Informations</p>
            <Field label="Nom de l'établissement" value={profile.business_name} onChange={v => setProfile({ ...profile, business_name: v })} />
            <Field label="Nom du contact" value={profile.contact_name} onChange={v => setProfile({ ...profile, contact_name: v })} />
            <Field label="Poste / Fonction" value={profile.position} onChange={v => setProfile({ ...profile, position: v })} />
            <Field label="Description courte" value={profile.tagline} onChange={v => setProfile({ ...profile, tagline: v })} />
            <Field label="Téléphone (identifiant de connexion)" value={profile.phone} onChange={v => setProfile({ ...profile, phone: v })} />
            <Field label="WhatsApp" value={profile.whatsapp} onChange={v => setProfile({ ...profile, whatsapp: v })} />
            <Field label="E-mail" value={profile.email} onChange={v => setProfile({ ...profile, email: v })} />
            <Field label="Adresse" value={profile.address} onChange={v => setProfile({ ...profile, address: v })} />
            <Field label="Lien Google Maps" value={profile.maps_link} onChange={v => setProfile({ ...profile, maps_link: v })} />
            <Field label="Site web" value={profile.website} onChange={v => setProfile({ ...profile, website: v })} />
          </div>

          <div className="flex flex-col gap-6 mt-6 md:mt-0">
            <div className="bg-white rounded-2xl p-5 border shadow-sm h-fit" style={{ borderColor: "#EEF1F6" }}>
              <div className="flex items-center justify-between mb-4">
                <p className="text-xs font-bold uppercase tracking-wide" style={{ color: "#94A3B8" }}>{cat.itemLabel}</p>
                <button onClick={addItem} style={{ color: BLUE }} className="text-xs font-semibold">+ Ajouter</button>
              </div>
              {items.map(it => (
                <div key={it.id} className="flex gap-2 mb-2">
                  <input value={it.name} onChange={e => updateItem(it.id, "name", e.target.value)} onBlur={() => persistItem(it.id)} style={{ background: "#F8FAFC", borderColor: "#E2E8F0", color: INK }} className="flex-1 border rounded-lg px-3 py-2 text-sm outline-none" />
                  <input value={it.subtitle || ""} onChange={e => updateItem(it.id, "subtitle", e.target.value)} onBlur={() => persistItem(it.id)} style={{ background: "#F8FAFC", borderColor: "#E2E8F0", color: INK }} className="w-24 border rounded-lg px-3 py-2 text-sm outline-none" placeholder="Prix" />
                  <button onClick={() => removeItem(it.id)} style={{ color: "#DC2626" }}>✕</button>
                </div>
              ))}
              {items.length === 0 && <p style={{ color: "#94A3B8" }} className="text-xs">Aucun élément pour le moment</p>}
            </div>

            <div className="bg-white rounded-2xl p-5 border shadow-sm h-fit" style={{ borderColor: "#EEF1F6" }}>
              <p className="text-xs font-bold uppercase tracking-wide mb-4" style={{ color: "#94A3B8" }}>Réseaux sociaux</p>

              {links.map(l => (
                <div key={l.id} className="flex gap-2 mb-2 items-center">
                  <span className="text-xs w-20 shrink-0 font-medium" style={{ color: INK }}>{l.label}</span>
                  <input value={l.url || ""} onChange={e => updateLink(l.id, e.target.value)} onBlur={() => persistLink(l.id)} placeholder="https://..." style={{ background: "#F8FAFC", borderColor: "#E2E8F0", color: INK }} className="flex-1 border rounded-lg px-3 py-2 text-sm outline-none" />
                  <button onClick={() => removeLink(l.id)} style={{ color: "#DC2626" }}>✕</button>
                </div>
              ))}
              {links.length === 0 && <p style={{ color: "#94A3B8" }} className="text-xs mb-3">Aucun réseau ajouté</p>}

              <div className="flex flex-wrap gap-2 mt-3">
                {SOCIAL_PLATFORMS.filter(p => !links.some(l => l.label === p.label)).map(p => (
                  <button key={p.icon} onClick={() => addLink(p)} style={{ borderColor: "#E2E8F0", color: BLUE }} className="border rounded-full px-3 py-1 text-xs font-medium">+ {p.label}</button>
                ))}
              </div>
            </div>
          </div>
        </div>

        {err && <p style={{ color: "#DC2626" }} className="text-xs mt-4">{err}</p>}
        <button onClick={saveProfile} style={{ background: BLUE }} className="w-full md:w-auto md:px-10 py-3 rounded-lg font-semibold text-white mt-6">{saved ? "Enregistré ✓" : "Enregistrer les modifications"}</button>
        </>)}

        {tab === "orders" && (
          <div className="grid md:grid-cols-2 gap-3">
            {orders.map(o => (
              <div key={o.id} className="bg-white border rounded-xl p-4 shadow-sm" style={{ borderColor: "#EEF1F6" }}>
                <div className="flex justify-between items-start gap-3">
                  <div className="min-w-0">
                    <p className="font-semibold text-sm truncate" style={{ color: INK }}>{o.customer_name}</p>
                    <p style={{ color: SLATE }} className="text-xs mt-0.5">
                      <a href={`tel:${o.customer_phone}`} style={{ color: BLUE }}>{o.customer_phone}</a> · {new Date(o.created_at).toLocaleString("fr-FR")}
                    </p>
                  </div>
                  <span style={{
                    color: o.status === "new" ? "#DC2626" : o.status === "completed" ? "#16A34A" : o.status === "cancelled" ? "#64748B" : "#B45309",
                    background: o.status === "new" ? "#FEF2F2" : o.status === "completed" ? "#F0FDF4" : o.status === "cancelled" ? "#F1F5F9" : "#FFFBEB",
                  }} className="text-xs font-semibold px-2 py-1 rounded-full shrink-0">
                    {{ new: "Nouvelle", preparing: "En préparation", ready: "Prête", completed: "Terminée", cancelled: "Annulée" }[o.status]}
                  </span>
                </div>

                <div className="mt-3 flex flex-col gap-1">
                  {(o.items || []).map((it, i) => (
                    <div key={i} className="flex justify-between text-xs" style={{ color: SLATE }}>
                      <span>{it.quantity} × {it.name}</span>
                      <span>{it.subtitle}</span>
                    </div>
                  ))}
                </div>
                {o.notes && <p style={{ color: SLATE }} className="text-xs mt-2 italic">« {o.notes} »</p>}

                <div className="flex gap-2 mt-3 flex-wrap">
                  {o.status === "new" && <button onClick={() => setOrderStatus(o, "preparing")} style={{ background: BLUE }} className="rounded-lg py-1.5 px-3 text-xs font-medium text-white">En préparation</button>}
                  {o.status === "preparing" && <button onClick={() => setOrderStatus(o, "ready")} style={{ background: BLUE }} className="rounded-lg py-1.5 px-3 text-xs font-medium text-white">Prête</button>}
                  {o.status === "ready" && <button onClick={() => setOrderStatus(o, "completed")} style={{ background: "#16A34A" }} className="rounded-lg py-1.5 px-3 text-xs font-medium text-white">Terminée</button>}
                  {o.status !== "completed" && o.status !== "cancelled" && <button onClick={() => setOrderStatus(o, "cancelled")} style={{ color: "#DC2626" }} className="text-xs font-medium">Annuler</button>}
                </div>
              </div>
            ))}
            {orders.length === 0 && <p style={{ color: "#94A3B8" }} className="text-sm">Aucune commande pour le moment</p>}
          </div>
        )}
      </div>
    </div>
  );
}

function AdminPanel() {
  const [token, setToken] = React.useState(null);
  const [email, setEmail] = React.useState("");
  const [pw, setPw] = React.useState("");
  const [err, setErr] = React.useState("");
  const [businesses, setBusinesses] = React.useState([]);
  const [pendingBusinesses, setPendingBusinesses] = React.useState([]);
  const [leads, setLeads] = React.useState([]);
  const [pwResets, setPwResets] = React.useState([]);
  const [tab, setTab] = React.useState("clients"); // clients | leads
  const [stats, setStats] = React.useState(null);
  const [showCreate, setShowCreate] = React.useState(false);
  const [newBiz, setNewBiz] = React.useState({ business_name: "", phone: "", email: "", category_id: 1 });
  const [justCreated, setJustCreated] = React.useState(null);
  const [activated, setActivated] = React.useState(null); // { businessName, shortCode }

  const refresh = async (t) => {
    const [biz, pend, st, ld, pr] = await Promise.all([
      api("/admin/businesses", { token: t }),
      api("/admin/businesses?status=pending", { token: t }),
      api("/admin/stats", { token: t }),
      api("/admin/leads", { token: t }),
      api("/admin/password-reset-requests", { token: t }),
    ]);
    setBusinesses(biz); setPendingBusinesses(pend); setStats(st); setLeads(ld); setPwResets(pr);
  };

  async function activateBusiness(b) {
    const res = await api(`/admin/businesses/${b.id}/activate`, { method: "POST", token });
    setActivated({ businessName: b.business_name, shortCode: res.shortCode });
    refresh(token);
  }

  async function login() {
    setErr("");
    try {
      const { token: t } = await api("/auth/admin/login", { method: "POST", body: { email, password: pw } });
      await refresh(t);
      setToken(t); // نفعّل التوكن فقط بعد ما نتأكد كل البيانات وصلت بنجاح
    } catch (e) { setErr(e.message); }
  }

  async function createBusiness() {
    try {
      const res = await api("/admin/businesses", { method: "POST", token, body: newBiz });
      setJustCreated({ shortCode: res.card.short_code, setupToken: res.setupToken }); setShowCreate(false);
      setNewBiz({ business_name: "", phone: "", email: "", category_id: 1 });
      refresh(token);
    } catch (e) { setErr(e.message); }
  }

  async function toggleStatus(b) {
    await api(`/admin/businesses/${b.id}/status`, { method: "PUT", token, body: { status: b.status === "active" ? "suspended" : "active" } });
    refresh(token);
  }

  async function deleteBusiness(b) {
    if (!window.confirm(`Supprimer définitivement "${b.business_name}" ? Cette action supprimera aussi ses cartes, commandes et statistiques. Cette action est irréversible.`)) return;
    await api(`/admin/businesses/${b.id}`, { method: "DELETE", token });
    refresh(token);
  }

  const [resetResult, setResetResult] = React.useState(null); // { businessName, setupToken }
  async function resetPassword(b) {
    const res = await api(`/admin/businesses/${b.id}/reset-password`, { method: "POST", token });
    setResetResult({ businessName: b.business_name, setupToken: res.setupToken });
  }

  function setupLink(t) {
    return `${window.location.origin}${window.location.pathname}#setup/${t}`;
  }

  async function setLeadStatus(l, status) {
    await api(`/admin/leads/${l.id}/status`, { method: "PUT", token, body: { status } });
    refresh(token);
  }

  async function handlePwReset(r) {
    await api(`/admin/password-reset-requests/${r.id}/handled`, { method: "PUT", token });
    setPwResets(pwResets.filter(x => x.id !== r.id));
  }

  function convertLead(l) {
    setNewBiz({ business_name: l.business_name, phone: l.phone || "", email: l.email || "", category_id: l.category_id || 1 });
    setTab("clients");
    setShowCreate(true);
  }

  const newLeadsCount = leads.filter(l => l.status === "new").length + pwResets.length;

  const BLUE = "#2554F0"; const INK = "#0F172A"; const SLATE = "#64748B";

  if (!token) {
    return (
      <div dir="ltr" style={{ background: "#F8FAFC", minHeight: "100vh", textAlign: "left" }} className="flex flex-col justify-center px-6">
        <button onClick={() => nav("#home")} className="text-sm mb-8" style={{ color: SLATE }}>‹ Accueil</button>
        <div className="max-w-sm mx-auto w-full bg-white rounded-2xl p-7 border shadow-sm" style={{ borderColor: "#EEF1F6" }}>
          <div style={{ background: INK }} className="w-11 h-11 rounded-xl flex items-center justify-center text-white text-lg mb-4">🛡️</div>
          <h1 className="text-xl font-bold mb-1" style={{ color: INK }}>Administration</h1>
          <p style={{ color: SLATE }} className="text-sm mb-6">Accès réservé à l'équipe BCSolutions</p>
          <input placeholder="Adresse e-mail" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && login()} style={{ background: "#F8FAFC", borderColor: "#E2E8F0", color: INK }} className="w-full border rounded-lg px-4 py-3 mb-3 text-sm outline-none" />
          <input placeholder="Mot de passe" type="password" value={pw} onChange={e => setPw(e.target.value)} onKeyDown={e => e.key === "Enter" && login()} style={{ background: "#F8FAFC", borderColor: "#E2E8F0", color: INK }} className="w-full border rounded-lg px-4 py-3 mb-4 text-sm outline-none" />
          {err && <p style={{ color: "#DC2626" }} className="text-xs mb-3">{err}</p>}
          <button onClick={login} style={{ background: BLUE }} className="w-full py-3 rounded-lg font-semibold text-white">Se connecter</button>
        </div>
      </div>
    );
  }

  return (
    <div dir="ltr" style={{ background: "#F8FAFC", minHeight: "100vh", textAlign: "left" }}>
      <div className="max-w-md md:max-w-4xl mx-auto px-6 py-8">
        <button onClick={() => nav("#home")} className="text-sm" style={{ color: SLATE }}>‹ Accueil</button>
        <h1 className="text-2xl font-extrabold mb-6 mt-4" style={{ color: INK }}>Tableau de bord</h1>

        {stats && (
          <div className="grid grid-cols-3 gap-3 mb-6 md:max-w-md">
            <Stat3 value={businesses.length} label="Cartes" color={INK} />
            <Stat3 value={businesses.filter(b => b.status === "active").length} label="Actives" color="#16A34A" />
            <Stat3 value={stats.totalScans} label="Scans" color={BLUE} />
          </div>
        )}

        <div className="flex gap-2 mb-6 border-b" style={{ borderColor: "#EEF1F6" }}>
          <button onClick={() => setTab("clients")} className="px-1 pb-3 text-sm font-semibold" style={{ color: tab === "clients" ? BLUE : SLATE, borderBottom: tab === "clients" ? `2px solid ${BLUE}` : "2px solid transparent" }}>Clients</button>
          <button onClick={() => setTab("pending")} className="px-4 pb-3 text-sm font-semibold flex items-center gap-1.5" style={{ color: tab === "pending" ? BLUE : SLATE, borderBottom: tab === "pending" ? `2px solid ${BLUE}` : "2px solid transparent" }}>
            Inscriptions
            {pendingBusinesses.length > 0 && <span style={{ background: "#DC2626" }} className="text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">{pendingBusinesses.length}</span>}
          </button>
          <button onClick={() => setTab("leads")} className="px-4 pb-3 text-sm font-semibold flex items-center gap-1.5" style={{ color: tab === "leads" ? BLUE : SLATE, borderBottom: tab === "leads" ? `2px solid ${BLUE}` : "2px solid transparent" }}>
            Demandes
            {newLeadsCount > 0 && <span style={{ background: "#DC2626" }} className="text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">{newLeadsCount}</span>}
          </button>
        </div>

        {tab === "clients" && (<>
        {resetResult && (
          <div style={{ background: "#FFFBEB", borderColor: "#F59E0B" }} className="border rounded-xl p-4 mb-6 text-sm flex items-center justify-between gap-2">
            <span style={{ color: INK }}>Lien de connexion pour {resetResult.businessName} : <code className="font-semibold break-all">{setupLink(resetResult.setupToken)}</code></span>
            <div className="flex gap-2 shrink-0">
              <button onClick={() => navigator.clipboard.writeText(setupLink(resetResult.setupToken))} style={{ color: "#B45309" }} className="font-semibold">Copier</button>
              <button onClick={() => setResetResult(null)} style={{ color: SLATE }}>✕</button>
            </div>
          </div>
        )}
        {justCreated && (
          <div style={{ background: "#EFF6FF", borderColor: BLUE }} className="border rounded-xl p-4 mb-6 text-sm" >
            <div className="flex items-center justify-between">
              <span style={{ color: INK }}>Client créé ! Lien de la carte : <code className="font-semibold">{justCreated.shortCode}</code></span>
              <button onClick={() => nav(`#card/${justCreated.shortCode}`)} style={{ color: BLUE }} className="font-semibold shrink-0 ml-2">Voir 👁</button>
            </div>
            {justCreated.setupToken && (
              <div className="flex items-center justify-between gap-2 mt-3 pt-3 border-t" style={{ borderColor: "#DCE7FF" }}>
                <span style={{ color: INK }}>Lien de connexion (envoyez-le au client) : <code className="font-semibold break-all">{setupLink(justCreated.setupToken)}</code></span>
                <button onClick={() => navigator.clipboard.writeText(setupLink(justCreated.setupToken))} style={{ color: BLUE }} className="font-semibold shrink-0 ml-2">Copier</button>
              </div>
            )}
          </div>
        )}

        {!showCreate ? (
          <button onClick={() => setShowCreate(true)} style={{ background: BLUE }} className="w-full md:w-auto md:px-8 py-3 rounded-lg font-semibold text-white mb-6">+ Ajouter un client</button>
        ) : (
          <div className="bg-white border rounded-2xl p-5 mb-6 md:max-w-md shadow-sm" style={{ borderColor: "#EEF1F6" }}>
            <p className="text-xs font-bold uppercase tracking-wide mb-3" style={{ color: "#94A3B8" }}>Nouveau client</p>
            <Field label="Nom de l'établissement" value={newBiz.business_name} onChange={v => setNewBiz({ ...newBiz, business_name: v })} />
            <Field label="Téléphone (identifiant de connexion)" value={newBiz.phone} onChange={v => setNewBiz({ ...newBiz, phone: v })} />
            <Field label="E-mail (optionnel)" value={newBiz.email} onChange={v => setNewBiz({ ...newBiz, email: v })} />
            <div className="mt-3">
              <label className="text-xs block mb-1 font-medium" style={{ color: SLATE }}>Catégorie</label>
              <select value={newBiz.category_id} onChange={e => setNewBiz({ ...newBiz, category_id: Number(e.target.value) })} style={{ background: "#F8FAFC", borderColor: "#E2E8F0", color: INK }} className="w-full border rounded-lg px-3 py-2.5 text-sm outline-none">
                {Object.entries(CATEGORIES).map(([id, v]) => <option key={id} value={id}>{v.label}</option>)}

            {err && <p style={{ color: "#DC2626" }} className="text-xs mt-3">{err}</p>}
            <div className="flex gap-2 mt-4">
              <button onClick={createBusiness} style={{ background: BLUE }} className="flex-1 py-2.5 rounded-lg text-sm font-semibold text-white">Créer</button>
              <button onClick={() => setShowCreate(false)} style={{ borderColor: "#E2E8F0", color: SLATE }} className="flex-1 py-2.5 rounded-lg text-sm border">Annuler</button>

          </div>

        <p className="text-xs font-bold uppercase tracking-wide mb-3" style={{ color: "#94A3B8" }}>Clients ({businesses.length})</p>
        <div className="grid md:grid-cols-2 gap-3">
          {businesses.map(b => (

                <div className="flex items-center gap-3 min-w-0">
                  <div style={{ background: BLUE }} className="w-9 h-9 rounded-lg flex items-center justify-center text-white text-sm font-bold shrink-0">
                    {b.business_name?.trim()?.[0]?.toUpperCase() || "?"}
                  </div>
                  <div className="min-w-0">
                    <p className="font-semibold text-sm truncate" style={{ color: INK }}>{b.business_name}</p>
                    <p style={{ color: SLATE }} className="text-xs mt-0.5">{CATEGORIES[b.category_id]?.label} · {b.card_count} carte(s) · {b.total_scans} scans</p>
                  </div>
                </div>
                <span style={{ color: b.status === "active" ? "#16A34A" : "#DC2626", background: b.status === "active" ? "#F0FDF4" : "#FEF2F2" }} className="text-xs font-semibold px-2 py-1 rounded-full shrink-0">{b.status === "active" ? "Active" : "Suspendue"}</span>
              </div>

              {b.short_codes?.[0] && (
                <div className="flex items-center justify-between gap-2 mt-3 px-2.5 py-2 rounded-lg" style={{ background: "#F8FAFC" }}>
                  <code className="text-xs truncate" style={{ color: SLATE }}>#{b.short_codes[0]}</code>
                  <div className="flex gap-2 shrink-0">
                    <button onClick={() => navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}#card/${b.short_codes[0]}`)} style={{ color: BLUE }} className="text-xs font-semibold">Copier</button>
                    <button onClick={() => nav(`#card/${b.short_codes[0]}`)} style={{ color: BLUE }} className="text-xs font-semibold">Voir</button>
                  </div>
                </div>
              )}

              <div className="flex gap-2 mt-3">
                <button onClick={() => toggleStatus(b)} style={{ borderColor: "#E2E8F0", color: b.status === "active" ? "#DC2626" : "#16A34A" }} className="flex-1 border rounded-lg py-1.5 text-xs font-medium">{b.status === "active" ? "Suspendre" : "Activer"}</button>
                <button onClick={() => resetPassword(b)} style={{ borderColor: "#E2E8F0", color: SLATE }} className="flex-1 border rounded-lg py-1.5 text-xs font-medium">Nouveau lien</button>
                <button onClick={() => deleteBusiness(b)} style={{ borderColor: "#FCA5A5", color: "#DC2626" }} className="border rounded-lg py-1.5 px-3 text-xs font-medium" title="Supprimer">🗑</button>
              </div>
            </div>
          ))}
          {businesses.length === 0 && <p style={{ color: "#94A3B8" }} className="text-sm">Aucun client pour le moment</p>}
        </div>
        </>)}

        {tab === "pending" && (
          <div className="grid md:grid-cols-2 gap-3">
            {activated && (
              <div style={{ background: "#F0FDF4", borderColor: "#16A34A" }} className="border rounded-xl p-4 md:col-span-2 text-sm flex items-center justify-between gap-2">
                <span style={{ color: INK }}>{activated.businessName} activé ! Lien de la carte : <code className="font-semibold">{activated.shortCode}</code></span>
                <div className="flex gap-2 shrink-0">
                  <button onClick={() => nav(`#card/${activated.shortCode}`)} style={{ color: "#16A34A" }} className="font-semibold">Voir 👁</button>
                  <button onClick={() => setActivated(null)} style={{ color: SLATE }}>✕</button>
                </div>
              </div>
            )}
            {pendingBusinesses.map(b => (
              <div key={b.id} className="bg-white border rounded-xl p-4 shadow-sm" style={{ borderColor: "#EEF1F6" }}>
                <div className="flex justify-between items-start gap-3">
                  <div className="min-w-0">
                    <p className="font-semibold text-sm truncate" style={{ color: INK }}>{b.business_name}</p>
                    <p style={{ color: SLATE }} className="text-xs mt-0.5">{CATEGORIES[b.category_id]?.label} · {b.contact_name || "—"}</p>
                  </div>
                  <span style={{ color: "#B45309", background: "#FFFBEB" }} className="text-xs font-semibold px-2 py-1 rounded-full shrink-0">En attente</span>
                </div>

                <div className="mt-3 text-xs space-y-1" style={{ color: SLATE }}>
                  <p>📞 <a href={`tel:${b.phone}`} style={{ color: BLUE }}>{b.phone}</a></p>
                  {b.email && <p>✉️ {b.email}</p>}
                  <p>🔑 Mot de passe : <code className="font-semibold" style={{ color: INK }}>{b.passwordPlain || "—"}</code></p>
                </div>

                <div className="flex gap-2 mt-3">
                  <button onClick={() => activateBusiness(b)} style={{ background: "#16A34A" }} className="flex-1 rounded-lg py-1.5 text-xs font-medium text-white">Activer</button>
                  <button onClick={() => deleteBusiness(b)} style={{ borderColor: "#FCA5A5", color: "#DC2626" }} className="border rounded-lg py-1.5 px-3 text-xs font-medium">🗑</button>
                </div>
              </div>
            ))}
            {pendingBusinesses.length === 0 && <p style={{ color: "#94A3B8" }} className="text-sm">Aucune inscription en attente</p>}
          </div>
        )}

        {tab === "leads" && (
          <div className="grid md:grid-cols-2 gap-3">
            {leads.map(l => (
              <div key={l.id} className="bg-white border rounded-xl p-4 shadow-sm" style={{ borderColor: "#EEF1F6" }}>
                <div className="flex justify-between items-start gap-3">
                  <div className="min-w-0">
                    <p className="font-semibold text-sm truncate" style={{ color: INK }}>{l.business_name}</p>
                    <p style={{ color: SLATE }} className="text-xs mt-0.5">{l.category_label || "—"} · {new Date(l.created_at).toLocaleDateString("fr-FR")}</p>
                  </div>
                  <span style={{
                    color: l.status === "new" ? "#DC2626" : l.status === "converted" ? "#16A34A" : "#64748B",
                    background: l.status === "new" ? "#FEF2F2" : l.status === "converted" ? "#F0FDF4" : "#F1F5F9",
                  }} className="text-xs font-semibold px-2 py-1 rounded-full shrink-0">
                    {{ new: "Nouvelle", contacted: "Contactée", converted: "Convertie", dismissed: "Rejetée" }[l.status]}
                  </span>
                </div>

                <div className="mt-3 text-xs space-y-1" style={{ color: SLATE }}>
                  {l.contact_name && <p>👤 {l.contact_name}</p>}
                  <p>📞 <a href={`tel:${l.phone}`} style={{ color: BLUE }}>{l.phone}</a></p>
                  {l.email && <p>✉️ {l.email}</p>}
                  {l.message && <p className="mt-1 italic">« {l.message} »</p>}
                </div>

                <div className="flex gap-2 mt-3 flex-wrap">
                  {l.status === "new" && <button onClick={() => setLeadStatus(l, "contacted")} style={{ borderColor: "#E2E8F0", color: SLATE }} className="border rounded-lg py-1.5 px-3 text-xs font-medium">Marquer contactée</button>}
                  {l.status !== "converted" && <button onClick={() => convertLead(l)} style={{ background: BLUE }} className="rounded-lg py-1.5 px-3 text-xs font-medium text-white">Convertir en client</button>}
                  {l.status !== "dismissed" && l.status !== "converted" && <button onClick={() => setLeadStatus(l, "dismissed")} style={{ color: "#DC2626" }} className="text-xs font-medium">Rejeter</button>}
                </div>
              </div>
            ))}
            {leads.length === 0 && <p style={{ color: "#94A3B8" }} className="text-sm">Aucune demande pour le moment</p>}
          </div>
        )}

        {tab === "leads" && pwResets.length > 0 && (
          <div className="mt-8">
            <p className="text-xs font-bold uppercase tracking-wide mb-3" style={{ color: "#94A3B8" }}>Mots de passe oubliés ({pwResets.length})</p>
            <div className="grid md:grid-cols-2 gap-3">
              {pwResets.map(r => (
                <div key={r.id} className="bg-white border rounded-xl p-4 shadow-sm flex items-center justify-between gap-3" style={{ borderColor: "#EEF1F6" }}>
                  <div>
                    <p className="font-semibold text-sm" style={{ color: INK }}><a href={`tel:${r.phone}`} style={{ color: BLUE }}>{r.phone}</a></p>
                    <p style={{ color: SLATE }} className="text-xs mt-0.5">{new Date(r.created_at).toLocaleString("fr-FR")}</p>
                  </div>
                  <button onClick={() => handlePwReset(r)} style={{ borderColor: "#E2E8F0", color: SLATE }} className="border rounded-lg py-1.5 px-3 text-xs font-medium shrink-0">Traité</button>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
